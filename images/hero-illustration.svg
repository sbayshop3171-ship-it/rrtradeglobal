<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d7a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#244d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#284f77;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tradeRouteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a8c5d;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#20c997;stop-opacity:0.1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a8c5d;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#20c997;stop-opacity:0.6" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>

  <!-- Decorative background circles with depth -->
  <circle cx="150" cy="100" r="120" fill="#2a8c5d" opacity="0.08"/>
  <circle cx="1050" cy="650" r="180" fill="#20c997" opacity="0.06"/>
  <circle cx="900" cy="150" r="100" fill="#2a8c5d" opacity="0.05"/>

  <!-- Large world map outline (simplified continental shapes) -->
  <g opacity="0.1" stroke="#2a8c5d" stroke-width="2" fill="none">
    <!-- Americas outline -->
    <path d="M 150 200 Q 180 250 200 300 Q 190 350 170 380 Q 150 350 140 300 Z"/>
    
    <!-- Europe-Africa outline -->
    <path d="M 450 150 Q 490 180 520 200 Q 540 220 550 250 Q 540 300 520 350 Q 490 380 450 390 Q 430 350 430 280 Z"/>
    
    <!-- Asia outline -->
    <path d="M 650 100 Q 720 140 780 160 Q 820 180 850 200 Q 880 240 900 300 Q 890 350 860 380 Q 800 390 750 380 Q 700 360 680 300 Z"/>
  </g>

  <!-- Trading route connections (curved paths) -->
  <g stroke="url(#tradeRouteGradient)" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Route 1: Americas to Europe -->
    <path d="M 200 280 Q 330 250 450 200" opacity="0.6"/>
    
    <!-- Route 2: Europe to Asia -->
    <path d="M 520 280 Q 600 240 680 200" opacity="0.5"/>
    
    <!-- Route 3: Asia to Americas -->
    <path d="M 800 320 Q 900 400 600 500 Q 400 480 200 380" opacity="0.4"/>
    
    <!-- Route 4: Regional connections -->
    <path d="M 450 320 Q 520 350 650 340" opacity="0.5"/>
    <path d="M 680 280 Q 750 320 820 360" opacity="0.4"/>
  </g>

  <!-- Cargo Ships -->
  <g>
    <!-- Ship 1 - Upper left -->
    <g transform="translate(280, 240)" opacity="0.7">
      <ellipse cx="0" cy="0" rx="35" ry="18" fill="#2a8c5d" opacity="0.3"/>
      <!-- Hull -->
      <path d="M -30 -5 L 30 -5 L 35 5 L -35 5 Z" fill="#2a8c5d" opacity="0.7"/>
      <!-- Containers -->
      <rect x="-20" y="-15" width="8" height="12" fill="#20c997" opacity="0.8"/>
      <rect x="-8" y="-15" width="8" height="12" fill="#2a8c5d" opacity="0.8"/>
      <rect x="4" y="-15" width="8" height="12" fill="#20c997" opacity="0.8"/>
      <rect x="16" y="-15" width="8" height="12" fill="#2a8c5d" opacity="0.8"/>
      <!-- Stack -->
      <rect x="-20" y="-27" width="8" height="8" fill="#20c997" opacity="0.6"/>
      <rect x="16" y="-27" width="8" height="8" fill="#20c997" opacity="0.6"/>
    </g>

    <!-- Ship 2 - Middle -->
    <g transform="translate(580, 380)" opacity="0.6">
      <ellipse cx="0" cy="0" rx="40" ry="20" fill="#2a8c5d" opacity="0.2"/>
      <path d="M -35 -6 L 35 -6 L 40 6 L -40 6 Z" fill="#20c997" opacity="0.6"/>
      <rect x="-24" y="-18" width="10" height="14" fill="#2a8c5d" opacity="0.7"/>
      <rect x="-10" y="-18" width="10" height="14" fill="#20c997" opacity="0.7"/>
      <rect x="6" y="-18" width="10" height="14" fill="#2a8c5d" opacity="0.7"/>
      <rect x="22" y="-18" width="10" height="14" fill="#20c997" opacity="0.7"/>
    </g>

    <!-- Ship 3 - Lower right -->
    <g transform="translate(750, 520)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="35" ry="18" fill="#2a8c5d" opacity="0.15"/>
      <path d="M -30 -5 L 30 -5 L 35 5 L -35 5 Z" fill="#2a8c5d" opacity="0.5"/>
      <rect x="-20" y="-14" width="8" height="11" fill="#20c997" opacity="0.6"/>
      <rect x="-8" y="-14" width="8" height="11" fill="#2a8c5d" opacity="0.6"/>
      <rect x="4" y="-14" width="8" height="11" fill="#20c997" opacity="0.6"/>
    </g>
  </g>

  <!-- Shipping Containers (scattered) -->
  <g opacity="0.5">
    <!-- Container group 1 -->
    <rect x="320" y="150" width="16" height="24" fill="#2a8c5d" opacity="0.7"/>
    <rect x="340" y="145" width="16" height="24" fill="#20c997" opacity="0.6"/>
    <rect x="360" y="150" width="16" height="24" fill="#2a8c5d" opacity="0.7"/>
    
    <!-- Container group 2 -->
    <rect x="700" y="450" width="18" height="26" fill="#20c997" opacity="0.6"/>
    <rect x="722" y="452" width="18" height="26" fill="#2a8c5d" opacity="0.6"/>
    
    <!-- Container group 3 -->
    <rect x="500" y="580" width="16" height="24" fill="#2a8c5d" opacity="0.5"/>
    <rect x="520" y="578" width="16" height="24" fill="#20c997" opacity="0.5"/>
  </g>

  <!-- Digital Business Nodes (circles representing connections) -->
  <g filter="url(#softGlow)">
    <!-- Node 1 -->
    <circle cx="200" cy="200" r="8" fill="#20c997" opacity="0.8"/>
    <circle cx="200" cy="200" r="14" fill="#20c997" opacity="0.2"/>
    
    <!-- Node 2 -->
    <circle cx="450" cy="250" r="7" fill="#2a8c5d" opacity="0.8"/>
    <circle cx="450" cy="250" r="12" fill="#2a8c5d" opacity="0.2"/>
    
    <!-- Node 3 -->
    <circle cx="680" cy="180" r="8" fill="#20c997" opacity="0.7"/>
    <circle cx="680" cy="180" r="13" fill="#20c997" opacity="0.15"/>
    
    <!-- Node 4 -->
    <circle cx="850" cy="300" r="7" fill="#2a8c5d" opacity="0.7"/>
    <circle cx="850" cy="300" r="12" fill="#2a8c5d" opacity="0.15"/>
    
    <!-- Node 5 -->
    <circle cx="580" cy="420" r="6" fill="#20c997" opacity="0.6"/>
    <circle cx="580" cy="420" r="11" fill="#20c997" opacity="0.1"/>
    
    <!-- Node 6 -->
    <circle cx="350" cy="500" r="7" fill="#2a8c5d" opacity="0.6"/>
    <circle cx="350" cy="500" r="11" fill="#2a8c5d" opacity="0.1"/>
  </g>

  <!-- Growth Indicators (upward arrows) -->
  <g opacity="0.6">
    <!-- Arrow 1 -->
    <g transform="translate(320, 380)">
      <line x1="0" y1="0" x2="0" y2="-25" stroke="#20c997" stroke-width="2" stroke-linecap="round"/>
      <polygon points="0,-25 -4,-18 4,-18" fill="#20c997"/>
    </g>
    
    <!-- Arrow 2 -->
    <g transform="translate(750, 300)">
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#2a8c5d" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="0,-30 -5,-20 5,-20" fill="#2a8c5d"/>
    </g>
    
    <!-- Arrow 3 -->
    <g transform="translate(520, 520)">
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#20c997" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="0,-22 -3,-15 3,-15" fill="#20c997"/>
    </g>
  </g>

  <!-- Supply Chain Flow Lines (dotted/dashed) -->
  <g stroke="#2a8c5d" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.4">
    <path d="M 280 240 Q 350 300 420 350"/>
    <path d="M 580 380 Q 650 420 720 460"/>
    <path d="M 750 300 Q 680 380 600 450"/>
  </g>

  <!-- Logistics Network Hexagons -->
  <g opacity="0.3" stroke="#20c997" stroke-width="1.5" fill="none">
    <!-- Hexagon 1 -->
    <polygon points="180,320 200,310 220,320 220,340 200,350 180,340" />
    
    <!-- Hexagon 2 -->
    <polygon points="850,420 870,410 890,420 890,440 870,450 850,440" />
    
    <!-- Hexagon 3 -->
    <polygon points="450,600 465,592 480,600 480,616 465,624 450,616" />
  </g>

  <!-- Subtle gridlines for digital aesthetic -->
  <g stroke="#2a8c5d" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
  </g>

  <!-- Accent glow elements for depth -->
  <g opacity="0.15">
    <ellipse cx="300" cy="600" rx="200" ry="100" fill="url(#accentGradient)"/>
    <ellipse cx="950" cy="200" rx="180" ry="120" fill="#20c997"/>
  </g>

  <!-- Connecting pulse dots -->
  <g opacity="0.4">
    <circle cx="400" cy="350" r="4" fill="#20c997"/>
    <circle cx="600" cy="280" r="3" fill="#2a8c5d"/>
    <circle cx="800" cy="400" r="3.5" fill="#20c997"/>
    <circle cx="300" cy="480" r="3" fill="#2a8c5d"/>
  </g>
</svg>